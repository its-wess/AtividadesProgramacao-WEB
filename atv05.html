<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Portfólio de Projetos</title>
    <link rel="stylesheet" href="/src/css/style_atv05.css">
</head>
<body>

    <header>
        <h1>Weslley Silva</h1>

        <nav>
            <ul>
                <li><a href="#sobre">Sobre</a></li>
                <li><a href="#projetos">Projetos</a></li>
                <li><a href="#contato">Contato</a></li>
            </ul>
        </nav>
    </header>

    <section id="sobre">
        <h2>Sobre Mim</h2>

        <img src="./src/img/profile.jpg" alt="Minha foto" width="150">

        <p>
            Sou estudante de programação e estou aprendendo desenvolvimento web.
            Gosto de criar projetos e aprender novas tecnologias.
        </p>
    </section>

    <section id="projetos">
        <h2>Meus Projetos</h2>

        <div id="lista-projetos"></div>
    </section>

    <section id="contato">
        <h2>Contato</h2>

        <form>
            <label for="nome">Nome:</label>
            <input type="text" id="nome" required>

            <br><br>

            <label for="email">E-mail:</label>
            <input type="email" id="email" required>

            <br><br>

            <label for="mensagem">Mensagem:</label>
            <textarea id="mensagem" required></textarea>

            <br><br>

            <button type="submit">Enviar</button>
        </form>
    </section>

    <footer>
        <p>2026 - Desenvolvido por Weslley Silva</p>
    </footer>

    <script src="./src/js/script.js"></script>
</body>
</html>
